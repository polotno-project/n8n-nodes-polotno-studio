openapi: 3.1.0
info:
  title: Polotno Studio API
  version: 1.0.0
  description: >-
    REST API for Polotno Studio — content automation platform.


    Renders images and videos from templates via the Polotno Cloud Render API.

    Designed for no-code automation (Zapier, Make, n8n) and direct API usage.


    **Billing:** subscription plan grants N credits per period (expire at period
    end).

    Topup packs add credits that never expire. Image render = 1 credit, video
    render = fps × duration.
  contact:
    name: API Support
    url: https://docs.studio.polotno.com
servers:
  - url: https://api.studio.polotno.com
    description: Production (use `key_live_...` keys)
security:
  - BearerAuth: []
  - ApiKeyHeader: []
tags:
  - name: Templates
  - name: Images
  - name: Videos
  - name: Bulk
  - name: Webhooks
  - name: Integration
    description: Endpoints used by Zapier/Make/n8n
