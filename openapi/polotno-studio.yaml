            type: string
            minLength: 1
            maxLength: 200
          required: false
          name: name
          in: query
        - schema:
            type: string
          required: false
          name: tag
          in: query
        - schema:
            type:
              - boolean
              - "null"
          required: false
          name: archived
          in: query
        - schema:
            type: string
            format: date-time
          required: false
          name: created_after
          in: query
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemplateList"
        "400": &a1
          $ref: "#/components/responses/BadRequest"
        "401": &a2
          $ref: "#/components/responses/Unauthorized"
        "404": &a3
          $ref: "#/components/responses/NotFound"
        "409": &a4
          $ref: "#/components/responses/Conflict"
        "422": &a5
          $ref: "#/components/responses/ValidationError"
        "429": &a6
