      operationId: createImage
      tags:
        - Images
      summary: Create an image render
      description: Async by default (returns 202). Pass `?sync=true` to wait up to 30s
        for the render to complete.
      parameters:
        - schema:
            type:
              - boolean
              - "null"
            default: false
          required: false
          name: sync
          in: query
        - schema:
            type: string
          required: false
          name: Idempotency-Key
          in: header
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImageCreate"
      responses:
        "201":
          description: Sync completion (only when `?sync=true` and render finishes within
            30s)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
        "202":
          description: Async — render queued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Image"
